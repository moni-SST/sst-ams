services:
  - type: web
    name: sst-ams-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && node src/db/init-pg.js
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: sst-ams-db
          property: connectionString
      - key: JWT_SECRET
        value: sst_ams_super_secret_key_change_in_production_2024
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: MAX_FILE_SIZE
        value: 10485760
      - key: CLIENT_URL
        value: https://sst-application-system.web.app

databases:
  - name: sst-ams-db
    plan: free
    databaseName: ams_db
    user: ams_user
